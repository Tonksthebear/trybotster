name: Release

on:
  push:
    tags:
      - "v*" # Triggers on version tags like v0.5.0

permissions:
  contents: write # Needed to create releases

jobs:
  build-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y pkg-config

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            cli/target/
          key: ${{ runner.os }}-cargo-release-build-cli-${{ hashFiles('cli/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-build-cli-

      - name: Build CLI
        env:
          BOTSTER_ENV: test
        working-directory: cli
        run: cargo test --no-run --lib --bins --tests

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: botster-cli
          path: cli/target/debug/botster
          retention-days: 1

  ci-gate:
    runs-on: ubuntu-latest
    needs: [build-cli]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y pkg-config

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            cli/target/
          key: ${{ runner.os }}-cargo-ci-gate-${{ hashFiles('cli/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ci-gate-

      - name: Run CLI tests
        working-directory: cli
        run: ./test.sh

  rails-test:
    runs-on: ubuntu-latest
    environment: test
    needs: [build-cli]

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev pkg-config

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: botster-cli
          path: cli/target/debug/

      - name: Make CLI executable
        run: chmod +x cli/target/debug/botster

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build Vite assets
        env:
          RAILS_ENV: test
        run: bin/vite build --mode=test

      - name: Run tests
        env:
          RAILS_ENV: test
          DB_HOST: localhost
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          SKIP_CLI_BUILD: "1"
        run: bin/rails db:test:prepare test

  rails-system-test:
    runs-on: ubuntu-latest
    environment: test
    needs: [build-cli]

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev pkg-config

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: botster-cli
          path: cli/target/debug/

      - name: Make CLI executable
        run: chmod +x cli/target/debug/botster

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build Vite assets
        env:
          RAILS_ENV: test
        run: bin/vite build --mode=test

      - name: Run system tests
        env:
          RAILS_ENV: test
          DB_HOST: localhost
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          SKIP_CLI_BUILD: "1"
        run: bin/rails db:test:prepare test:system

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore

  build-and-release:
    needs: [ci-gate, rails-test, rails-system-test]
    strategy:
      fail-fast: false # Continue building other platforms if one fails
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: botster-macos-arm64
          - os: macos-15-intel # Intel runner (available until Aug 2027)
            target: x86_64-apple-darwin
            artifact_name: botster-macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: botster-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: botster-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install packages
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y pkg-config

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" cli/Cargo.toml
          rm -f cli/Cargo.toml.bak
          echo "Building version: ${VERSION}"

      - name: Verify portable Ghostty CPU target on Linux
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: grep -Fq -- '-Dcpu=baseline' cli/build.rs

      - name: Build release binary
        run: |
          cd cli
          cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp cli/target/${{ matrix.target }}/release/botster ${{ matrix.artifact_name }}

      - name: Create checksum
        run: |
          shasum -a 256 ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_name }}
            ${{ matrix.artifact_name }}.sha256
          draft: false
          prerelease: false
